<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aniket made a calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Caveat+Brush&display=swap" rel="stylesheet">
<style>
  @font-face {
  font-family: 'Bristol';
  src: url('Bristol.woff') format('woff'),
       url('Bristol.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
  :root {
    --bg: #f5f2ee;
    --paper: #faf8f4;
    --ink: #1a1a1a;
    --red: #c0392b;
    --faint: #c8c4bc;
    --accent: #2c2c2c;
    --today-dot: #c0392b;
    --hover-bg: rgba(192,57,43,0.08);
    --progress-bg: #e0dbd3;
    --progress-fill: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 8px 40px;
    font-family: 'Bristol', 'Caveat', cursive;
    color: var(--ink);
  }

  /* ── Year Navigation ── */
  .year-nav {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 6px;
  }

  .year-btn {
    background: none;
    border: 1.5px solid var(--faint);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-family: 'Bristol', 'Caveat', cursive;
    font-size: 18px;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .year-btn:hover { background: var(--hover-bg); border-color: var(--red); }

  .year-title {
    font-family: 'Bristol', 'Caveat Brush', cursive;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--ink);
    min-width: 90px;
    text-align: center;
  }

  /* ── Progress Bar ── */
  .progress-wrap {
    width: 100%;
    max-width: 760px;
    margin-bottom: 18px;
    padding: 0 8px;
  }

  .progress-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--progress-bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--progress-fill);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* ── Calendar Wrapper ── */
  .cal-outer {
    background: var(--paper);
    border-radius: 18px;
    box-shadow: 0 2px 32px rgba(0,0,0,0.07);
    padding: 24px 10px 32px;
    width: 100%;
    max-width: 820px;
    overflow-x: auto;
  }

  /* ── Grid ── */
  .cal-grid {
    display: grid;
    /* col 0: day labels, cols 1-12: months */
    grid-template-columns: 36px repeat(12, 1fr);
    row-gap: 0;
    min-width: 520px;
  }

  /* Header row */
  .cell-header {
    font-family: 'Caveat Brush', cursive;
    font-size: 13px;
    color: var(--faint);
    text-align: center;
    padding-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .cell-header.day-label { text-align: left; }

  /* Day-of-week labels (leftmost column) */
  .cell-dow {
    font-family: 'Bristol', 'Caveat', cursive;
    font-size: 12.5px;
    color: var(--faint);
    display: flex;
    align-items: center;
    height: 24px;
    padding-right: 4px;
    white-space: nowrap;
  }

  /* Empty cells */
  .cell-empty {
    height: 24px;
  }

  /* Date cells */
  .cell-date {
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13.5px;
    font-family: 'Bristol', 'Caveat', cursive;
    cursor: pointer;
    border-radius: 5px;
    position: relative;
    transition: background 0.12s, transform 0.12s;
    user-select: none;
  }

  .cell-date:hover {
    background: var(--hover-bg);
    transform: scale(1.18);
    z-index: 2;
  }

  .cell-date.sunday { color: var(--red); }
  .cell-date.today {
    font-weight: 700;
  }
  .cell-date.today::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--today-dot);
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: var(--ink);
    color: #fff;
    font-family: 'Bristol', 'Caveat', cursive;
    font-size: 15px;
    padding: 5px 12px;
    border-radius: 8px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    white-space: nowrap;
  }
  #tooltip.show { opacity: 1; }
</style>
</head>
<body>

<div class="year-nav">
  <button class="year-btn" id="btn-prev">&#8592;</button>
  <div class="year-title" id="year-title">2026</div>
  <button class="year-btn" id="btn-next">&#8594;</button>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-label">
    <span id="progress-text-left"></span>
    <span id="progress-text-right"></span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<div class="cal-outer">
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div id="tooltip"></div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentYear = 2026;

function isLeap(y){ return (y%4===0&&y%100!==0)||(y%400===0); }

function daysInMonth(y, m){ // m: 0-indexed
  return [31, isLeap(y)?29:28, 31,30,31,30,31,31,30,31,30,31][m];
}

// Returns 0=Mon ... 6=Sun
function weekdayOf(y, m, d){
  const date = new Date(y, m, d);
  return (date.getDay() + 6) % 7;
}

function buildCalendar(year){
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const today = new Date();
  const isCurrentYear = today.getFullYear() === year;

  // Progress bar
  const pw = document.getElementById('progress-wrap');
  if(isCurrentYear){
    pw.style.display = '';
    const start = new Date(year, 0, 1);
    const end   = new Date(year+1, 0, 1);
    const total = end - start;
    const elapsed = today - start;
    const pct = Math.max(0, Math.min(100, (elapsed/total)*100));
    const dayOfYear = Math.floor(elapsed / 86400000) + 1;
    const totalDays = isLeap(year) ? 366 : 365;
    const daysLeft = totalDays - dayOfYear + 1;
    document.getElementById('progress-fill').style.width = pct.toFixed(2)+'%';
    document.getElementById('progress-text-left').textContent = `Day ${dayOfYear} of ${totalDays} — ${pct.toFixed(1)}% through ${year}`;
    document.getElementById('progress-text-right').textContent = `${daysLeft} days left`;
  } else {
    pw.style.display = 'none';
  }

  // Build column offsets per month: how many rows to skip (0=Mon start)
  const startDow = []; // 0-6 for each month
  const dims = [];
  for(let m=0;m<12;m++){
    startDow.push(weekdayOf(year, m, 1));
    dims.push(daysInMonth(year, m));
  }

  // Max rows needed = max(startDow[m] + dims[m]) across all months
  let maxRows = 0;
  for(let m=0;m<12;m++) maxRows = Math.max(maxRows, startDow[m]+dims[m]);

  // ── Header row ──
  // empty top-left corner
  const corner = document.createElement('div');
  corner.className = 'cell-header day-label';
  grid.appendChild(corner);
  for(let m=0;m<12;m++){
    const h = document.createElement('div');
    h.className = 'cell-header';
    h.textContent = MONTHS[m];
    grid.appendChild(h);
  }

  // ── Day rows ──
  for(let row=0; row<maxRows; row++){
    const dow = row % 7; // 0=Mon .. 6=Sun

    // Day label cell
    const dowCell = document.createElement('div');
    dowCell.className = 'cell-dow';
    // Only show label at start of each week block (first occurrence)
    if(dow < 7){
      dowCell.textContent = DAYS[dow];
    }
    grid.appendChild(dowCell);

    // Month cells
    for(let m=0;m<12;m++){
      const dayNum = row - startDow[m] + 1;
      if(dayNum < 1 || dayNum > dims[m]){
        const e = document.createElement('div');
        e.className = 'cell-empty';
        grid.appendChild(e);
      } else {
        const cell = document.createElement('div');
        cell.className = 'cell-date';
        if(dow===6) cell.classList.add('sunday');
        const isTodayCell = isCurrentYear
          && today.getMonth()===m
          && today.getDate()===dayNum;
        if(isTodayCell) cell.classList.add('today');
        cell.textContent = dayNum;
        cell.dataset.label = `${MONTH_NAMES_FULL[m]} ${dayNum}, ${year}`;
        cell.addEventListener('click', onDateClick);
        cell.addEventListener('mousemove', onDateHover);
        cell.addEventListener('mouseleave', hideTooltip);
        grid.appendChild(cell);
      }
    }
  }
}

const tooltip = document.getElementById('tooltip');

function onDateClick(e){
  const label = e.currentTarget.dataset.label;
  tooltip.textContent = '📅 ' + label;
  tooltip.classList.add('show');
  positionTooltip(e);
  clearTimeout(tooltip._hide);
  tooltip._hide = setTimeout(hideTooltip, 2000);
}

function onDateHover(e){
  const label = e.currentTarget.dataset.label;
  tooltip.textContent = label;
  tooltip.classList.add('show');
  positionTooltip(e);
}

function hideTooltip(){
  tooltip.classList.remove('show');
}

function positionTooltip(e){
  const x = e.clientX + 12;
  const y = e.clientY - 28;
  tooltip.style.left = Math.min(x, window.innerWidth - tooltip.offsetWidth - 12)+'px';
  tooltip.style.top  = Math.max(4, y)+'px';
}

document.getElementById('btn-prev').addEventListener('click', ()=>{
  currentYear--;
  document.getElementById('year-title').textContent = currentYear;
  buildCalendar(currentYear);
});

document.getElementById('btn-next').addEventListener('click', ()=>{
  currentYear++;
  document.getElementById('year-title').textContent = currentYear;
  buildCalendar(currentYear);
});

buildCalendar(currentYear);
</script>
</body>
</html>
